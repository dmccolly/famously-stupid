<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famously Stupid</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #ff4d4d;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }
        .container {
            border: 2px solid #ff4d4d;
            padding: 2rem;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Famously Stupid</h1>
        <p>The Ministry of Information is currently curating the truth.</p>
        <p class="blink">BROADCAST IMMINENT</p>
    </div>
</body>
</html>
